<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#12141c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<title>Cronograma Simplifica</title>
<style>
  :root{
    --bg:#12141c; --card:#1b1e2b; --card2:#232739; --txt:#e8eaf2; --dim:#8b90a5;
    --excel:#2e9e5b; --pbi:#e8b114; --ia:#7c5cff; --ok:#2e9e5b; --next:#ff9d3c;
  }
  *{box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',system-ui,sans-serif;}
  body{background:var(--bg); color:var(--txt); font-size:13.5px; padding:10px 10px 14px; user-select:none;}
  header{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  header h1{font-size:15px; font-weight:600; flex:1;}
  #sync{font-size:10px; color:#555b76; vertical-align:middle;}
  #sync.ok{color:var(--ok);} #sync.erro{color:#e05252;}
  #geral{font-size:12px; color:var(--dim); text-align:right; line-height:1.3;}
  #geral b{color:var(--txt); font-size:15px;}
  .barra{height:5px; background:#2c3044; border-radius:3px; overflow:hidden; margin-top:4px;}
  .barra i{display:block; height:100%; border-radius:3px; transition:width .3s;}
  .curso{background:var(--card); border-radius:10px; margin-bottom:8px; overflow:hidden;}
  .curso-head{display:flex; align-items:center; gap:8px; padding:9px 11px; cursor:pointer;}
  .curso-head:hover{background:var(--card2);}
  .dot{width:10px; height:10px; border-radius:50%; flex-shrink:0;}
  .curso-head .nome{flex:1; font-weight:600; font-size:13.5px;}
  .curso-head .meta{font-size:11px; color:var(--dim); white-space:nowrap;}
  .curso-head .chev{color:var(--dim); font-size:11px; transition:transform .2s;}
  .curso.aberto .chev{transform:rotate(90deg);}
  .curso .barra{margin:0 11px 8px;}
  .itens{display:none; padding:2px 6px 8px;}
  .curso.aberto .itens{display:block;}
  .item{display:flex; align-items:center; gap:8px; padding:6px 6px; border-radius:7px; cursor:pointer;}
  .item:hover{background:var(--card2);}
  .chk{width:17px; height:17px; border:2px solid #4a4f68; border-radius:50%; flex-shrink:0;
       display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff;}
  .item.feito .chk{background:var(--ok); border-color:var(--ok);}
  .item .txt{flex:1; line-height:1.25;}
  .item.feito .txt{color:var(--dim); text-decoration:line-through;}
  .item .data{font-size:10px; color:var(--dim); white-space:nowrap;}
  .item.proxima{background:rgba(255,157,60,.09); outline:1px solid rgba(255,157,60,.4);}
  .badge{font-size:9.5px; font-weight:700; color:var(--next); border:1px solid var(--next);
         border-radius:4px; padding:1px 5px; white-space:nowrap;}
  .edit-btns{display:none; gap:4px;}
  body.editando .edit-btns{display:flex;}
  body.editando .item .data{display:none;}
  .mini{background:#31364d; border:none; color:var(--txt); border-radius:5px; width:22px; height:22px;
        cursor:pointer; font-size:11px;}
  .mini:hover{background:#3d4360;}
  .add-aula{display:none; margin:4px 6px 2px; background:none; border:1px dashed #4a4f68; color:var(--dim);
        border-radius:7px; padding:5px; width:calc(100% - 12px); cursor:pointer; font-size:12px;}
  body.editando .add-aula{display:block;}
  .add-aula:hover{color:var(--txt); border-color:var(--dim);}
  footer{display:flex; gap:6px; margin-top:10px;}
  footer button{flex:1; background:var(--card); border:none; color:var(--dim); padding:7px 4px;
        border-radius:8px; cursor:pointer; font-size:11.5px;}
  footer button:hover{background:var(--card2); color:var(--txt);}
  body.editando #btnEditar{background:var(--next); color:#1b1e2b; font-weight:700;}
  #toast{position:fixed; left:50%; bottom:14px; transform:translateX(-50%); background:#2e9e5b; color:#fff;
        padding:7px 16px; border-radius:20px; font-size:12px; opacity:0; pointer-events:none; transition:opacity .3s;}
  #toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <h1>📚 Simplifica <span id="sync" title="Sincronização com a nuvem">●</span></h1>
  <div id="geral"></div>
</header>
<div id="cursos"></div>
<footer>
  <button id="btnEditar" onclick="toggleEditar()">✎ Editar</button>
  <button onclick="exportar()">💾 Backup</button>
  <button onclick="document.getElementById('arq').click()">📂 Restaurar</button>
  <input type="file" id="arq" accept=".json" style="display:none" onchange="importar(this)">
</footer>
<div id="toast"></div>

<script>
const CHAVE = 'cronograma-simplifica-v3';

const PADRAO = {
  cursos: [
    { id:'excel', nome:'Excel', cor:'var(--excel)', meta:'meta: out/2026', aberto:true, itens:[
      {nome:'COMECE AQUI', feito:true, data:'2026-07-02T12:00:00'},
      {nome:'Informações Iniciais', feito:true, data:'2026-07-02T12:00:00'},
      {nome:'Assistentes Inteligentes Simplifica', feito:true, data:'2026-07-02T12:00:00'},
      {nome:'Módulo 1 - Saindo do Zero no Excel', feito:true, data:'2026-07-02T12:00:00'},
      'Módulo 2 - Fórmulas Essenciais e Produtividade',
      'Módulo 3 - Fórmulas e Recursos de Mercado - Parte 1',
      'Módulo 4 - Fórmulas e Recursos de Mercado - Parte 2',
      'Módulo 5 - Fórmulas e Recursos de Mercado - Parte 3',
      'Módulo 6 - Análise e Tratamento de Dados',
      'Módulo 7 - Gráficos e Apresentação de Informações',
      'Módulo 8 - Tabelas Dinâmicas e Análises',
      'Módulo 9 - Fórmulas e Recursos Especiais e Avançados',
      'Módulo 10 - Testes, Provas e Desafios de Excel',
      'Módulo 11 - Dashboards e Relatórios Profissionais',
    ]},
    { id:'pbi', nome:'Power BI', cor:'var(--pbi)', meta:'meta: mar/2027 (férias em dez)', aberto:false, itens:[
      'Módulo 1 - Introdução ao Power BI',
      'Módulo 2 - Primeiros Projetos no Power BI',
      'Módulo 3 - Tratamento de Dados e Power Query',
      'Módulo 4 - Modelagem de Dados e Relacionamentos',
      'Módulo 5 - Funções e Linguagem DAX',
      'Módulo 6 - Gráficos e Visuais',
      'Módulo 7 - Dashboards e Relatórios no Power BI',
      'Módulo 8 - Power BI Serviço',
      'Módulo 9 - Biblioteca de Dashboards e Templates',
    ]},
    { id:'ia', nome:'Inteligência Artificial', cor:'var(--ia)', meta:'meta: mai/2027', aberto:false, itens:[
      'Informações Iniciais',
      'As Ferramentas mais Importantes de IA',
      'Biblioteca de Ferramentas de IA',
      'Assistentes de IA',
      'Inteligência Artificial e Dados',
      'Agentes de IA e Automação',
      'Business Cases e Aplicações Práticas',
      'Dicas Rápidas, Hacks e Guias',
    ]},
  ]
};

let dados;
function carregar(){
  try{
    dados = JSON.parse(localStorage.getItem(CHAVE));
    if(!dados || !dados.cursos) throw 0;
  }catch(e){
    dados = { cursos: PADRAO.cursos.map(c => ({...c, itens: c.itens.map(n =>
      typeof n === 'string' ? {nome:n, feito:false, data:null} : {feito:false, data:null, ...n})})) };
    salvar();
  }
}
function salvar(){ localStorage.setItem(CHAVE, JSON.stringify(dados)); salvarNuvemDebounce(); }

// ---- Sincronização com a nuvem (Supabase) ----
const SUPA_URL = 'https://splkpfmpnpclxxuktggl.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwbGtwZm1wbnBjbHh4dWt0Z2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODM5MjAsImV4cCI6MjA5NTk1OTkyMH0.PWwjUzdYQMSY3SYP-h3hqVzqXRK6eUCTgNpu7MwH6Iw';
const SUPA_H = {'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY, 'Content-Type':'application/json'};
function setSync(cls){ const s=document.getElementById('sync'); if(s){ s.className=cls; } }

async function carregarNuvem(){
  try{
    const r = await fetch(SUPA_URL+'/rest/v1/cronograma_estudo?id=eq.1&select=dados,updated_at', {headers:SUPA_H});
    if(!r.ok) throw 0;
    const rows = await r.json();
    if(rows.length){
      dados = rows[0].dados;
      localStorage.setItem(CHAVE, JSON.stringify(dados));
      render();
    } else {
      await salvarNuvem(); // primeira vez: sobe o estado local
    }
    setSync('ok');
  }catch(e){ setSync('erro'); }
}

let syncTimer;
function salvarNuvemDebounce(){ clearTimeout(syncTimer); syncTimer = setTimeout(salvarNuvem, 800); }
async function salvarNuvem(){
  try{
    const r = await fetch(SUPA_URL+'/rest/v1/cronograma_estudo', {
      method:'POST',
      headers:{...SUPA_H, 'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify({id:1, dados:dados, updated_at:new Date().toISOString()})
    });
    setSync(r.ok ? 'ok' : 'erro');
  }catch(e){ setSync('erro'); }
}

function proximaGlobal(){
  for(const c of dados.cursos)
    for(let i=0;i<c.itens.length;i++)
      if(!c.itens[i].feito) return c.id+'_'+i;
  return null;
}

function render(){
  const prox = proximaGlobal();
  let totF=0, totN=0;
  const el = document.getElementById('cursos');
  el.innerHTML = '';
  dados.cursos.forEach(c=>{
    const f = c.itens.filter(i=>i.feito).length, n = c.itens.length;
    totF+=f; totN+=n;
    const pct = n? Math.round(100*f/n):0;
    const div = document.createElement('div');
    div.className = 'curso'+(c.aberto?' aberto':'');
    div.innerHTML = `
      <div class="curso-head" onclick="toggleCurso('${c.id}')">
        <span class="dot" style="background:${c.cor}"></span>
        <span class="nome">${c.nome}</span>
        <span class="meta">${f}/${n} · ${(PADRAO.cursos.find(p=>p.id===c.id)||c).meta}</span>
        <span class="chev">▶</span>
      </div>
      <div class="barra"><i style="width:${pct}%; background:${c.cor}"></i></div>
      <div class="itens">
        ${c.itens.map((it,i)=>{
          const id = c.id+'_'+i;
          const ehProx = id===prox;
          return `<div class="item ${it.feito?'feito':''} ${ehProx?'proxima':''}" onclick="toggleItem('${c.id}',${i})">
            <span class="chk">${it.feito?'✓':''}</span>
            <span class="txt">${it.nome}</span>
            ${ehProx?'<span class="badge">PRÓXIMA</span>':''}
            ${it.feito&&it.data?`<span class="data">${fmtData(it.data)}</span>`:''}
            <span class="edit-btns">
              <button class="mini" onclick="renomear(event,'${c.id}',${i})">✎</button>
              <button class="mini" onclick="excluir(event,'${c.id}',${i})">✕</button>
            </span>
          </div>`;
        }).join('')}
        <button class="add-aula" onclick="addAula(event,'${c.id}')">+ adicionar aula</button>
      </div>`;
    el.appendChild(div);
  });
  const pctG = totN? Math.round(100*totF/totN):0;
  document.getElementById('geral').innerHTML =
    `<b>${pctG}%</b> · ${totF}/${totN} concluídos<div class="barra" style="width:110px"><i style="width:${pctG}%; background:linear-gradient(90deg,var(--excel),var(--pbi),var(--ia))"></i></div>`;
  document.title = `Cronograma Simplifica — ${pctG}%`;
}

function fmtData(iso){ const d=new Date(iso); return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0'); }
function acha(id){ return dados.cursos.find(c=>c.id===id); }

function toggleCurso(id){ const c=acha(id); c.aberto=!c.aberto; salvar(); render(); }

function toggleItem(id,i){
  if(document.body.classList.contains('editando')) return;
  const it = acha(id).itens[i];
  it.feito = !it.feito;
  it.data = it.feito ? new Date().toISOString() : null;
  salvar(); render();
  if(it.feito) toast('Boa! Aula concluída 🎉');
}

function toggleEditar(){ document.body.classList.toggle('editando'); }
function renomear(ev,id,i){
  ev.stopPropagation();
  const it = acha(id).itens[i];
  const novo = prompt('Novo nome:', it.nome);
  if(novo && novo.trim()){ it.nome = novo.trim(); salvar(); render(); }
}
function excluir(ev,id,i){
  ev.stopPropagation();
  const c = acha(id);
  if(confirm('Excluir "'+c.itens[i].nome+'"?')){ c.itens.splice(i,1); salvar(); render(); }
}
function addAula(ev,id){
  ev.stopPropagation();
  const nome = prompt('Nome da nova aula:');
  if(nome && nome.trim()){ acha(id).itens.push({nome:nome.trim(), feito:false, data:null}); salvar(); render(); }
}

function exportar(){
  const blob = new Blob([JSON.stringify(dados,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cronograma-simplifica-backup.json';
  a.click();
  toast('Backup baixado');
}
function importar(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{
      const d = JSON.parse(r.result);
      if(!d.cursos) throw 0;
      dados = d; salvar(); render(); toast('Backup restaurado');
    }catch(e){ alert('Arquivo inválido.'); } };
  r.readAsText(f);
  inp.value='';
}

let tId;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tId); tId = setTimeout(()=>t.classList.remove('show'), 2200);
}

carregar(); render();
carregarNuvem();
if('serviceWorker' in navigator && location.protocol === 'https:')
  navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
