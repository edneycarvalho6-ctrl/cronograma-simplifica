<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#12141c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<title>Cronograma Simplifica</title>
<style>
  :root{
    --bg:#0f1117; --card:#191c27; --card2:#242938; --borda:#2a2f42; --txt:#eceef6; --dim:#9298ad;
    --excel:#34b168; --pbi:#f0b91e; --ia:#8b6dff; --ok:#34b168; --next:#ff9d3c;
  }
  *{box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',system-ui,sans-serif;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg); color:var(--txt); font-size:15px; padding:0 14px 90px; user-select:none; max-width:700px; margin:0 auto;}
  header{position:sticky; top:0; z-index:10; background:var(--bg); display:flex; align-items:center;
         gap:12px; padding:14px 2px 12px; border-bottom:1px solid var(--borda); margin-bottom:14px;}
  header h1{font-size:18px; font-weight:700; flex:1; letter-spacing:.2px;}
  #sync{font-size:11px; color:#555b76; vertical-align:middle;}
  #sync.ok{color:var(--ok);} #sync.erro{color:#e05252;}
  #geral{font-size:12.5px; color:var(--dim); text-align:right; line-height:1.35;}
  #geral b{color:var(--txt); font-size:19px; font-weight:700;}
  .barra{height:6px; background:#272c3d; border-radius:4px; overflow:hidden; margin-top:5px;}
  .barra i{display:block; height:100%; border-radius:4px; transition:width .3s;}
  .curso{background:var(--card); border:1px solid var(--borda); border-radius:14px; margin-bottom:12px; overflow:visible;}
  .curso-head{display:flex; align-items:center; gap:11px; padding:15px 16px; cursor:pointer; border-radius:14px;}
  .curso.aberto > .curso-head{position:sticky; top:62px; z-index:8; background:var(--card);
         border-bottom:1px solid var(--borda); border-radius:14px 14px 0 0;}
  .curso-head:hover{background:var(--card2);}
  .dot{width:12px; height:12px; border-radius:50%; flex-shrink:0;}
  .curso-head .nome{flex:1; font-weight:700; font-size:16.5px;}
  .curso-head .meta{font-size:12.5px; color:var(--dim); white-space:nowrap;}
  .chev{color:var(--dim); font-size:12px; transition:transform .2s; flex-shrink:0;}
  .aberto > .curso-head .chev, .mod.aberto > .mod-head .chev{transform:rotate(90deg);}
  .curso > .barra{margin:0 16px 12px;}
  .curso.aberto > .barra{margin-top:12px;}
  .mods{display:none; padding:4px 10px 12px;}
  .curso.aberto > .mods{display:block;}
  .mod{border-radius:10px; margin-bottom:4px;}
  .mod.aberto{background:#151823; border:1px solid var(--borda); margin:8px 0;}
  .mod-head{display:flex; align-items:center; gap:10px; padding:12px 12px; border-radius:10px; cursor:pointer;}
  .mod.aberto > .mod-head{position:sticky; top:119px; z-index:6; background:#1d2130;
         border-bottom:1px solid var(--borda); border-radius:10px 10px 0 0;}
  .mod-head:hover{background:var(--card2);}
  .mod-head .mnome{flex:1; font-weight:600; font-size:14.5px; line-height:1.3;}
  .mod-head .mfrac{font-size:12px; color:var(--dim); white-space:nowrap; background:#272c3d;
         padding:3px 9px; border-radius:10px;}
  .mod.completo > .mod-head .mfrac{color:var(--ok); background:rgba(52,177,104,.12);}
  .mod-head .mchk{color:var(--ok); font-size:15px;}
  .mod.completo > .mod-head .mnome{color:var(--dim);}
  .aulas{display:none; padding:6px 8px 4px 16px;}
  .mod.aberto > .aulas{display:block;}
  .item{display:flex; align-items:center; gap:11px; padding:10px 10px; border-radius:9px; cursor:pointer;}
  .item:hover{background:var(--card2);}
  .chk{width:21px; height:21px; border:2px solid #4a5069; border-radius:50%; flex-shrink:0;
       display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; transition:all .15s;}
  .item.feito .chk{background:var(--ok); border-color:var(--ok);}
  .item .txt{flex:1; line-height:1.35; font-size:14.5px;}
  .item.feito .txt{color:var(--dim); text-decoration:line-through;}
  .item .data{font-size:11px; color:var(--dim); white-space:nowrap;}
  .item.proxima, .mod-head.proxima{background:rgba(255,157,60,.1); outline:1.5px solid rgba(255,157,60,.5);}
  .badge{font-size:10.5px; font-weight:700; color:var(--next); border:1.5px solid var(--next);
         border-radius:5px; padding:2px 7px; white-space:nowrap;}
  .fechar{text-align:center; color:var(--dim); font-size:12.5px; padding:10px; cursor:pointer;
         border-top:1px solid var(--borda); margin-top:4px;}
  .fechar:hover{color:var(--txt); background:var(--card2); border-radius:0 0 10px 10px;}
  footer{position:fixed; bottom:0; left:0; right:0; z-index:12; display:flex; gap:10px; justify-content:center;
         padding:12px 14px calc(12px + env(safe-area-inset-bottom)); background:linear-gradient(transparent, var(--bg) 35%);}
  footer button{background:var(--card); border:1px solid var(--borda); color:var(--txt); padding:11px 18px;
        border-radius:12px; cursor:pointer; font-size:13.5px; font-weight:600;}
  footer button:hover{background:var(--card2);}
  footer button:first-child{background:var(--next); border-color:var(--next); color:#1a1206;}
  #toast{position:fixed; left:50%; bottom:74px; transform:translateX(-50%); background:#2e9e5b; color:#fff;
        padding:9px 20px; border-radius:22px; font-size:13.5px; font-weight:600; opacity:0; pointer-events:none;
        transition:opacity .3s; white-space:nowrap; z-index:20;}
  #toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <h1>📚 Simplifica <span id="sync" title="Sincronização com a nuvem">●</span></h1>
  <div id="geral"></div>
</header>
<div id="cursos"></div>
<footer>
  <button onclick="irParaProxima()">🎯 Próxima aula</button>
  <button onclick="exportar()">💾 Backup</button>
  <button onclick="document.getElementById('arq').click()">📂 Restaurar</button>
  <input type="file" id="arq" accept=".json" style="display:none" onchange="importar(this)">
</footer>
<div id="toast"></div>

<script src="dados-cursos.js"></script>
<script>
const CHAVE = 'cronograma-simplifica-v4';
const VERSAO = 4;

function novoDeSeed(){
  // deep-copy do PADRAO com campos de estado garantidos
  const d = JSON.parse(JSON.stringify(PADRAO));
  d.cursos.forEach(c => {
    if(c.aberto === undefined) c.aberto = false;
    c.modulos.forEach(m => {
      if(m.aberto === undefined) m.aberto = false;
      if(!m.aulas) m.aulas = [];
      if(m.aulas.length === 0 && m.feito === undefined){ m.feito = false; m.data = null; }
      m.aulas.forEach(a => { if(a.feito === undefined) a.feito = false; if(a.data === undefined) a.data = null; });
    });
  });
  return d;
}

// aplica os "feito" de um estado antigo sobre a estrutura nova do seed (casando por nome)
function mesclar(seed, antigo){
  if(!antigo || !antigo.cursos) return seed;
  const marca = {};
  antigo.cursos.forEach(c => (c.modulos || []).forEach(m => {
    if(m.feito) marca[c.id + '|' + m.nome] = m.data || null;
    (m.aulas || []).forEach(a => { if(a.feito) marca[c.id + '|' + m.nome + '|' + a.nome] = a.data || null; });
  }));
  seed.cursos.forEach(c => c.modulos.forEach(m => {
    const km = c.id + '|' + m.nome;
    if(m.aulas.length === 0 && km in marca){ m.feito = true; m.data = marca[km]; }
    m.aulas.forEach(a => { const k = km + '|' + a.nome; if(k in marca){ a.feito = true; a.data = marca[k]; } });
  }));
  return seed;
}

let dados;
function carregar(){
  try{
    dados = JSON.parse(localStorage.getItem(CHAVE));
    if(!dados || dados.v !== VERSAO) throw 0;
  }catch(e){
    dados = novoDeSeed();
    salvarLocal();
  }
}
function salvarLocal(){ localStorage.setItem(CHAVE, JSON.stringify(dados)); }
function salvar(){ salvarLocal(); salvarNuvemDebounce(); }

// ---- Sincronização com a nuvem (Supabase) ----
const SUPA_URL = 'https://splkpfmpnpclxxuktggl.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwbGtwZm1wbnBjbHh4dWt0Z2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODM5MjAsImV4cCI6MjA5NTk1OTkyMH0.PWwjUzdYQMSY3SYP-h3hqVzqXRK6eUCTgNpu7MwH6Iw';
const SUPA_H = {'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY, 'Content-Type':'application/json'};
function setSync(cls){ const s = document.getElementById('sync'); if(s) s.className = cls; }

async function carregarNuvem(){
  try{
    const r = await fetch(SUPA_URL+'/rest/v1/cronograma_estudo?id=eq.1&select=dados', {headers:SUPA_H});
    if(!r.ok) throw 0;
    const rows = await r.json();
    if(rows.length && rows[0].dados && rows[0].dados.v === VERSAO){
      dados = rows[0].dados;
      salvarLocal();
    } else {
      // nuvem vazia ou em formato antigo: mescla progresso antigo na estrutura nova e sobe
      dados = mesclar(novoDeSeed(), rows.length ? rows[0].dados : dados);
      salvarLocal();
      await salvarNuvem();
    }
    render();
    setSync('ok');
  }catch(e){ setSync('erro'); }
}

let syncTimer;
function salvarNuvemDebounce(){ clearTimeout(syncTimer); syncTimer = setTimeout(salvarNuvem, 800); }
async function salvarNuvem(){
  try{
    const r = await fetch(SUPA_URL+'/rest/v1/cronograma_estudo', {
      method:'POST',
      headers:{...SUPA_H, 'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify({id:1, dados:dados, updated_at:new Date().toISOString()})
    });
    setSync(r.ok ? 'ok' : 'erro');
  }catch(e){ setSync('erro'); }
}

// ---- lógica ----
function statsModulo(m){
  if(m.aulas.length === 0) return {f: m.feito?1:0, n:1};
  return {f: m.aulas.filter(a=>a.feito).length, n: m.aulas.length};
}
function proximaGlobal(){
  for(const c of dados.cursos)
    for(let mi=0; mi<c.modulos.length; mi++){
      const m = c.modulos[mi];
      if(m.aulas.length === 0){ if(!m.feito) return {c:c.id, mi, ai:-1}; continue; }
      for(let ai=0; ai<m.aulas.length; ai++)
        if(!m.aulas[ai].feito) return {c:c.id, mi, ai};
    }
  return null;
}
function fmtData(iso){ const d = new Date(iso); return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0'); }
function acha(id){ return dados.cursos.find(c=>c.id===id); }

function render(){
  const prox = proximaGlobal();
  let totF=0, totN=0;
  const el = document.getElementById('cursos');
  el.innerHTML = '';
  dados.cursos.forEach(c=>{
    let cf=0, cn=0;
    c.modulos.forEach(m=>{ const s=statsModulo(m); cf+=s.f; cn+=s.n; });
    totF+=cf; totN+=cn;
    const pct = cn? Math.round(100*cf/cn):0;
    const div = document.createElement('div');
    div.className = 'curso'+(c.aberto?' aberto':'');
    let modsHtml = c.modulos.map((m,mi)=>{
      const s = statsModulo(m);
      const completo = s.f===s.n;
      const ehProxMod = prox && prox.c===c.id && prox.mi===mi;
      if(m.aulas.length === 0){
        // módulo sem aulas detalhadas: a linha é o próprio item clicável
        return `<div class="mod ${completo?'completo':''}">
          <div class="mod-head ${ehProxMod?'proxima':''}" onclick="toggleModuloInteiro('${c.id}',${mi})">
            <span class="chk ${''}" style="${m.feito?'background:var(--ok);border-color:var(--ok);':''}">${m.feito?'✓':''}</span>
            <span class="mnome" style="${m.feito?'color:var(--dim);text-decoration:line-through;':''}">${m.nome}</span>
            ${ehProxMod?'<span class="badge">PRÓXIMA</span>':''}
            ${m.feito&&m.data?`<span class="mfrac">${fmtData(m.data)}</span>`:''}
          </div></div>`;
      }
      return `<div class="mod ${m.aberto?'aberto':''} ${completo?'completo':''}">
        <div class="mod-head ${ehProxMod&&!m.aberto?'proxima':''}" onclick="toggleModulo('${c.id}',${mi})">
          ${completo?'<span class="mchk">✓</span>':''}
          <span class="mnome">${m.nome}</span>
          <span class="mfrac">${s.f}/${s.n}</span>
          <span class="chev">▶</span>
        </div>
        <div class="aulas">
          ${m.aulas.map((a,ai)=>{
            const ehProx = prox && prox.c===c.id && prox.mi===mi && prox.ai===ai;
            return `<div class="item ${a.feito?'feito':''} ${ehProx?'proxima':''}" onclick="toggleAula('${c.id}',${mi},${ai})">
              <span class="chk">${a.feito?'✓':''}</span>
              <span class="txt">${a.nome}</span>
              ${ehProx?'<span class="badge">PRÓXIMA</span>':''}
              ${a.feito&&a.data?`<span class="data">${fmtData(a.data)}</span>`:''}
            </div>`;
          }).join('')}
          <div class="fechar" onclick="toggleModulo('${c.id}',${mi})">▲ Recolher ${m.nome.split(' - ')[0]}</div>
        </div></div>`;
    }).join('');
    div.innerHTML = `
      <div class="curso-head" onclick="toggleCurso('${c.id}')">
        <span class="dot" style="background:${c.cor}"></span>
        <span class="nome">${c.nome}</span>
        <span class="meta">${cf}/${cn} · ${c.meta}</span>
        <span class="chev">▶</span>
      </div>
      <div class="barra"><i style="width:${pct}%; background:${c.cor}"></i></div>
      <div class="mods">${modsHtml}</div>`;
    el.appendChild(div);
  });
  const pctG = totN? Math.round(100*totF/totN):0;
  document.getElementById('geral').innerHTML =
    `<b>${pctG}%</b> · ${totF}/${totN} aulas<div class="barra" style="width:110px"><i style="width:${pctG}%; background:linear-gradient(90deg,var(--excel),var(--pbi),var(--ia))"></i></div>`;
  document.title = `Cronograma Simplifica — ${pctG}%`;
}

function toggleCurso(id){ const c=acha(id); c.aberto=!c.aberto; salvarLocal(); render(); }
function toggleModulo(id,mi){ const m=acha(id).modulos[mi]; m.aberto=!m.aberto; salvarLocal(); render(); }
function toggleModuloInteiro(id,mi){
  const m = acha(id).modulos[mi];
  m.feito = !m.feito;
  m.data = m.feito ? new Date().toISOString() : null;
  salvar(); render();
  if(m.feito) toast('Módulo concluído! 🎉');
}
function toggleAula(id,mi,ai){
  const a = acha(id).modulos[mi].aulas[ai];
  a.feito = !a.feito;
  a.data = a.feito ? new Date().toISOString() : null;
  salvar(); render();
  if(a.feito) toast('Boa! Aula concluída 🎉');
}
function irParaProxima(){
  const prox = proximaGlobal();
  if(!prox){ toast('Tudo concluído! 🏆'); return; }
  dados.cursos.forEach(c=>{ c.aberto = (c.id===prox.c); c.modulos.forEach((m,mi)=>{ m.aberto = (c.id===prox.c && mi===prox.mi); }); });
  salvarLocal(); render();
  const alvo = document.querySelector('.proxima');
  if(alvo) alvo.scrollIntoView({behavior:'smooth', block:'center'});
}

function exportar(){
  const blob = new Blob([JSON.stringify(dados,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cronograma-simplifica-backup.json';
  a.click();
  toast('Backup baixado');
}
function importar(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{
      const d = JSON.parse(r.result);
      if(!d.cursos) throw 0;
      dados = d.v===VERSAO ? d : mesclar(novoDeSeed(), d);
      salvar(); render(); toast('Backup restaurado');
    }catch(e){ alert('Arquivo inválido.'); } };
  r.readAsText(f);
  inp.value='';
}

let tId;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tId); tId = setTimeout(()=>t.classList.remove('show'), 2200);
}

carregar(); render();
carregarNuvem();
if('serviceWorker' in navigator && location.protocol === 'https:')
  navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
